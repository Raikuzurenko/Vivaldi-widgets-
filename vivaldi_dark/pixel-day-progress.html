<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Day Progress</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    background: #000;
    width: 300px; /* MATCH OTHER WIDGETS */
  }

  body {
    font-family: 'Press Start 2P', cursive;
    color: #e8e8e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    gap: 14px;
    image-rendering: pixelated;
    position: relative;
  }

  /* scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* title */
  #label {
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.9;
  }

  /* bar */
  #bar {
    width: 260px;
    height: 18px;
    display: grid;
    grid-template-columns: repeat(30, 1fr);
    gap: 2px;
  }

  .pixel {
    width: 100%;
    height: 100%;
    background: #111;
    border: 1px solid #1c1c1c;
  }

  .pixel.filled {
    background: #e8e8e8;
    box-shadow: 0 0 4px rgba(232,232,232,0.25);
  }

  /* text */
  #percent {
    font-size: 7px;
    letter-spacing: 1px;
    text-align: center;
  }

  #time-left {
    font-size: 6px;
    letter-spacing: 1px;
    color: #666;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.4;
  }
</style>
</head>

<body>

<div id="label">DAY PROGRESS</div>
<div id="bar"></div>
<div id="percent">0%</div>
<div id="time-left">calculating...</div>

<script>
const PIXELS = 30;
const bar = document.getElementById('bar');

const pixels = [];
for (let i = 0; i < PIXELS; i++) {
  const p = document.createElement('div');
  p.className = 'pixel';
  bar.appendChild(p);
  pixels.push(p);
}

function update() {
  const now = new Date();
  const start = new Date(now);
  start.setHours(0,0,0,0);

  const end = new Date(now);
  end.setHours(24,0,0,0);

  const total = end - start;
  const passed = now - start;

  const percent = passed / total;
  const filled = Math.round(percent * PIXELS);

  pixels.forEach((p, i) => {
    if (i < filled) p.classList.add('filled');
    else p.classList.remove('filled');
  });

  document.getElementById('percent').textContent =
    Math.round(percent * 100) + '% OF DAY';

  const msLeft = total - passed;
  const hours = Math.floor(msLeft / (1000 * 60 * 60));
  const mins = Math.floor((msLeft % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById('time-left').textContent =
    hours + 'H ' + mins + 'M LEFT';
}

update();
setInterval(update, 1000);
</script>

</body>
</html>
